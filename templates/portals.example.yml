# Career-Ops Portal Scanner Configuration
# Customized for: Ashutosh Pradhan
# Target: Senior / Staff Technical Program Manager
# Focus: AI/ML Platforms, Developer Tools, Cloud Infrastructure, Enterprise SaaS
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Core TPM titles --
    - "Technical Program Manager"
    - "TPM"
    - "Sr. TPM"
    - "Senior TPM"
    - "Staff TPM"
    - "Principal TPM"
    - "Lead TPM"
    # -- Program / Project Management --
    - "Program Manager"
    - "Senior Program Manager"
    - "Staff Program Manager"
    - "Engineering Program Manager"
    - "Technology Program Manager"
    # -- AI/ML specific TPM --
    - "AI Program Manager"
    - "ML Program Manager"
    - "AI/ML Program Manager"
    - "LLM Program Manager"
    - "Generative AI Program Manager"
    # -- Developer / Platform TPM --
    - "Developer Platform"
    - "Platform Program Manager"
    - "Developer Experience"
    - "DevEx Program"
    # -- Adjacent roles (stretch) --
    - "Technical Product Manager"
    - "Documentation Program Manager"
    - "Content Program Manager"
    - "Knowledge Program Manager"

  negative:
    # Exclude non-relevant roles
    - "Junior"
    - "Intern"
    - "Associate Program Manager"
    - "Coordinator"
    - "Marketing Program Manager"
    - "HR Program"
    - "Recruiting Program"
    - "Finance Program"
    - "Legal Program"
    - "Compliance Program"
    - "Sales Program Manager"
    - "Event Program"
    - "Clinical Program"
    - "Healthcare Program"
    - "Supply Chain"
    - "Procurement"
    - ".NET"
    - "iOS"
    - "Android"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "COBOL"
    - "Mainframe"

  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Sr."
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head of"
    - "Director"
    - "Group"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.

search_queries:

  # -- Ashby --
  - name: Ashby — TPM Core
    query: 'site:jobs.ashbyhq.com "Technical Program Manager" OR "TPM" remote senior'
    enabled: true

  - name: Ashby — AI/ML TPM
    query: 'site:jobs.ashbyhq.com "Program Manager" "AI" OR "ML" OR "LLM" OR "Generative" remote'
    enabled: true

  - name: Ashby — Platform & DevEx TPM
    query: 'site:jobs.ashbyhq.com "Program Manager" "platform" OR "developer experience" OR "developer tools" remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — TPM Core
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Technical Program Manager" remote senior'
    enabled: true

  - name: Greenhouse — AI/ML TPM
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Program Manager" "AI" OR "ML" OR "LLM" remote senior'
    enabled: true

  - name: Greenhouse — Engineering Program Manager
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Engineering Program Manager" OR "Staff TPM" remote'
    enabled: true

  - name: Greenhouse — Developer Platform TPM
    query: 'site:job-boards.greenhouse.io "Program Manager" "developer platform" OR "developer experience" OR "API" remote'
    enabled: true

  # -- Lever --
  - name: Lever — TPM
    query: 'site:jobs.lever.co "Technical Program Manager" OR "Senior Program Manager" remote'
    enabled: true

  - name: Lever — AI Program Manager
    query: 'site:jobs.lever.co "Program Manager" "AI" OR "ML" OR "LLM" OR "Generative AI" remote senior'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — TPM AI Startups
    query: 'site:wellfound.com "Technical Program Manager" OR "TPM" "AI" OR "ML" remote senior'
    enabled: true

  # -- Workable --
  - name: Workable — TPM
    query: 'site:apply.workable.com "Technical Program Manager" OR "Program Manager" "AI" OR "platform" remote senior'
    enabled: true

  # -- Broad search --
  - name: LinkedIn-style — Senior TPM AI/ML
    query: '"Senior Technical Program Manager" OR "Staff TPM" "AI" OR "ML" OR "cloud" remote 2025'
    enabled: true

  - name: Broad — TPM Developer Tools
    query: '"Technical Program Manager" "developer tools" OR "developer platform" OR "API platform" remote senior'
    enabled: true

  - name: Broad — TPM Cloud Infrastructure
    query: '"Technical Program Manager" "cloud" OR "AWS" OR "infrastructure" remote senior 2025'
    enabled: true

  - name: Broad — Documentation Program Manager
    query: '"Documentation Program Manager" OR "Content Program Manager" "AI" OR "platform" OR "developer" remote senior'
    enabled: true

